services:                   
  nginx:
    image: nginx:stable
    container_name: nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "80:80" 
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

  backend:
    build: ./backend/
    container_name: backend
    networks:
      - backend

networks:
  backend: